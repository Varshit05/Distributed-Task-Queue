version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: task_queue_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_queue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: task_queue_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no # Optimize for development caching speed
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
